language: en-US
early_access: false
reviews:
  profile: assertive
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true
  collapse_walkthrough: true
  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - develop
      - main
  path_filters:
    - '!dist/**'
    - '!.astro/**'
    - '!.turbo/**'
    - '!pnpm-lock.yaml'
  path_instructions:
    - path: '**/*.astro'
      instructions: |
        Review Astro components for proper Island architecture,
        correct usage of scoped CSS, and hydration directives.
    - path: 'packages/schema/**'
      instructions: |
        Validate Zod schema definitions for type safety and
        proper error messages.
    - path: 'apps/web/**/AGENTS.md'
      instructions: |
        Validate that agent definitions include clear name, description,
        and responsibility structure as specified in coding guidelines.
chat:
  auto_reply: true
